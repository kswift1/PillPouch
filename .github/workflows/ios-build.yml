name: iOS Build

on:
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'

jobs:
  build:
    name: Build & Test (iOS)
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode / Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Ensure iOS Simulator runtime
        run: |
          # visionOS 키 매칭 방지: SimRuntime.iOS- 정확 매칭
          HAS_IOS=$(xcrun simctl list devices available -j \
            | jq '[.devices | to_entries[] | select(.key | test("SimRuntime\\.iOS-")) | .value[] | select(.name | startswith("iPhone"))] | length')
          echo "Available iPhone (iOS) simulators: $HAS_IOS"
          if [ "$HAS_IOS" -eq 0 ]; then
            echo "No iOS Simulator runtime found, downloading..."
            sudo xcodebuild -runFirstLaunch
            xcodebuild -downloadPlatform iOS
          fi

      - name: Pick first available iPhone simulator
        id: sim
        run: |
          SIM_ID=$(xcrun simctl list devices available -j \
            | jq -r '[.devices | to_entries[] | select(.key | test("SimRuntime\\.iOS-")) | .value[] | select(.name | startswith("iPhone")) | .udid] | first')
          if [ -z "$SIM_ID" ] || [ "$SIM_ID" = "null" ]; then
            echo "No iPhone (iOS) simulator available even after download attempt"
            xcrun simctl list devices
            exit 1
          fi
          echo "sim_id=$SIM_ID" >> "$GITHUB_OUTPUT"
          xcrun simctl list devices available | grep "$SIM_ID"

      - name: Build
        run: |
          xcodebuild \
            -scheme PillPouch \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        run: |
          xcodebuild test \
            -scheme PillPouch \
            -destination "id=${{ steps.sim.outputs.sim_id }}" \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/TestResults.xcresult
          retention-days: 7
